<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        th{
            padding: 6px 45px 6px 45px;
            text-align: center;
        }
        td{
            padding: 6px 45px 6px 10px;
        }
        
    </style>
</head>
<body>
 
    <center>
        Advanced HTML Table Example
    </center>
    <center style="padding: 30px;">
        <table border="1">
            <caption>Employee Information Table</caption>
            <thead>
                <tr>
                    <th rowspan="2">name</th>
                    <th colspan="2">Details</th>
                    <th rowspan="2">Age</th>
                    <th rowspan="2">Country</th>
                </tr>
                <tr>
                    <th>Positions</th>
                    <th>Departments</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Yashwanth</td>
                    <td>Manager</td>
                    <td>Sales</td>
                    <td>35</td>
                    <td>India</td>
                </tr>
                <tr>
                    <td rowspan="2">Snehith</td>
                    <td>Developer</td>
                    <td>IT</td>
                    <td rowspan="2">42</td>
                    <td rowspan="2">USA</td>
                </tr>
                <tr>
                    <td>Developer</td>
                    <td>IT</td>
                </tr>
                
                <tr>
                    <td>Prabhakar</td>
                    <td colspan="2" style="text-align:center;">Support Team</td>
                    <td>29</td>
                    <td>Canada</td>
                </tr>
                <tr>
                    <td>Saiteja</td>
                    <td>Intern</td>
                    <td>HR</td>
                    <td>75</td>
                    <td>UK</td>
                </tr>

            </tbody>
        </table>
    </center>

    
</body>
</html>
