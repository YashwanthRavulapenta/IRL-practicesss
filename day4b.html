<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        th{
            padding: 6px 45px 6px 45px;
            text-align: center;
        }
        td{
            padding: 6px 45px 6px 10px;
        }
        
    </style>
</head>
<body>
 
    <center>
        <b><h2 style="color:rgb(31, 31, 73);">Advanced HTML Table Example</h2></b>
    </center>
    <center style="padding: 30px;">
        <table border="3" style="border-color: rgb(31, 31, 73);">
            <caption style="color: rgb(137, 36, 36);"><b>Employee Information Table</b></caption>
            <thead>
                <tr>
                    <th rowspan="2" style="background-color: rgb(219, 219, 252);">name</th>
                    <th colspan="2" style="background-color: rgb(219, 219, 252);">Details</th>
                    <th rowspan="2" style="background-color: rgb(219, 219, 252);">Age</th>
                    <th rowspan="2" style="background-color: rgb(219, 219, 252);">Country</th>
                </tr>
                <tr>
                    <th style="background-color: rgb(221, 240, 245);">Positions</th>
                    <th style="background-color: rgb(221, 240, 245);">Departments</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Yashwanth</td>
                    <td>Manager</td>
                    <td>Sales</td>
                    <td>35</td>
                    <td>India</td>
                </tr>
                <tr>
                    <td rowspan="2">Snehith</td>
                    <td>Developer</td>
                    <td>IT</td>
                    <td rowspan="2">42</td>
                    <td rowspan="2">USA</td>
                </tr>
                <tr>
                    <td>Developer</td>
                    <td>IT</td>
                </tr>
                
                <tr>
                    <td>Prabhakar</td>
                    <td colspan="2" style="text-align:center; background-color:rgb(232, 240, 197);">Support Team</td>
                    <td>29</td>
                    <td>Canada</td>
                </tr>
                <tr>
                    <td>Saiteja</td>
                    <td>Intern</td>
                    <td>HR</td>
                    <td>75</td>
                    <td>UK</td>
                </tr>

            </tbody>
        </table>
    </center>

    
</body>
</html>
