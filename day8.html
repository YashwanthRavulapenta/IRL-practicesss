<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        *{
            margin-left: 0;
            padding-left:0;
            box-sizing: border-box;
        }
        .outer_div{
            margin-left:100px ;
            padding-left: 5px;
            border: 1px solid rgb(100, 108, 100);
            width: 500px;
            height: 700px;
            border-radius: 10px;
        }
        .zero_div{
            width: 440px;
            height: 90px;
            border: 1px solid rgb(193, 196, 193);
            border-radius: 6px;
            text-align: end;
            margin: 20px;
            background-color: rgb(225, 220, 220);
            margin-bottom: 15px;
        }
        .number{
            box-sizing: border-box;
            font-size: 30px;
            margin: 20px;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 4500;
        }
        .middle_div{
            margin:20px;
        }
        .square_div{
            margin-right: 10px;
            box-sizing: border-box;
            background-color: rgb(244, 242, 242);
            border: 1px solid rgb(199, 197, 197);
            display: inline-block;
            width: 100px;
            height: 90px;
            text-align: center;
            border-radius: 14px;
        }
        .two_combo_div{
            border: 1px solid rgb(185, 188, 185);
            display: inline-block;
            width: 215px;
            height: 90px;
            text-align: center;
            margin-right: 10px;
            border-radius: 13px;
        }
        .blue_square_back{
            background-color: rgb(206, 206, 252);
        }
    </style>
</head>
<body>
        <div class="outer_div">
            <div class="zero_div">
                <p class="number">0</p>
            </div>
            <div style="margin-bottom: 20px;" class="middle_div">
                <div class="square_div">
                    <p class="number">7</p>
                </div>
                <div class="square_div">
                    <p class="number">8</p>
                </div>
                <div class="square_div">
                    <p class="number">9</p>
                </div>
                <div class="square_div blue_square_back">
                    <p class="number">/</p>
                </div>
            </div>

            <div style="margin-bottom: 20px;" class="middle_div">
                <div class="square_div">
                    <p class="number">4</p>
                </div>
                <div class="square_div">
                    <p class="number">5</p>
                </div>
                <div class="square_div">
                    <p class="number">6</p>
                </div>
                <div class="square_div blue_square_back">
                    <p class="number">x</p>
                </div>
            </div>

            <div style="margin-bottom: 20px;" class="middle_div">
                <div class="square_div">
                    <p class="number">1</p>
                </div>
                <div class="square_div">
                    <p class="number">2</p>
                </div>
                <div class="square_div">
                    <p class="number">3</p>
                </div>
                <div class="square_div blue_square_back">
                    <p class="number">-</p>
                </div>
            </div>
            <div class="middle_div">
                <div class="two_combo_div" style="background-color: rgb(243, 240, 240);">
                    <p class="number">0</p>
                </div>
                <div class="square_div">
                    <p class="number">.</p>
                </div>
                <div class="square_div blue_square_back">
                    <p class="number">+</p>
                </div>
            </div>
            <div class="middle_div">
                <div class="square_div blue_square_back">
                    <p class="number ">=</p>
                </div>
                <div class="square_div blue_square_back">
                    <p class="number">C</p>
                </div>
                <div class="two_combo_div" style="background-color: rgb(250, 176, 176);">
                    <p class="number">ON/OFF</p>
                </div>
            </div>
        </div>
</body>
</html>
