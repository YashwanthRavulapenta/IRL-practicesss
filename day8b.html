<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day8b</title>
    <style>
        *{
           padding: 0;
           margin:0;
           box-sizing: border-box; 
        }
        .outer_div{
            border: 1px solid lightslategray;
            border-radius: 10px;
            width: 800px;
            height: 750px;
            padding: 20px;
            margin: 600px;
            margin-top:50px ;
        }
        .todo_div{
            text-align: center;
            line-height: 60px;
        }
        .todo_name{
            font-size: 40px;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .desc_div{
            text-align: center;
            line-height: 40px;       
        }
        .desc_para{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 20px;
        }
        .task_filling_div{
            text-align: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        .input_class{
            font-size: 16px;
            padding-left: 20px;
            line-height: 40px;
            width: 80%;
            height: 60px;
            border-radius: 15px;
            border: 1px solid dimgrey;
        }
        .add_button{
            font-size: 20px;
            width: 130px;
            height: 60px;
            border-radius: 15px;
            margin-left: 10px;
            color: rgb(255, 255, 255);
            border: 1px solid green;
            background-color: rgb(12, 184, 0);
        }
        .item_div{
            width: 100;
            border-radius: 15px;
            border: 1px solid rgb(203, 203, 203);
            margin-top: 35px;
            padding: 30px;
            background-color: rgb(235, 235, 235);
        }
        .item_name{
            font-size: 20px;
            display: inline-block;
            width: 80%;
            font-size: 21px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .item_button{
            font-size: 18px;
            width: 110px;
            height: 60px;
            color: white;
            border:1px solid red;
            background-color: rgb(244, 41, 41);
            border-radius: 15px;
            padding: 10px;
        }
        button{
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <div class="outer_div">
        <div class="todo_div">
            <h1 class="todo_name">Todo List</h1>
        </div>
        <div class="desc_div">
            <p class="desc_para">Add tasks and kepp track of your day</p>
        </div>
        <div class="task_filling_div">
            <input class="input_class" placeholder="Enter a new task"/>
            <button class="add_button">Add</button>
        </div>
        <hr>
        <div class="item_div">
            <p class="item_name">Buy Groceries</p>
            <button class="item_button">Delete</button>
        </div>
        <div class="item_div">
            <p class="item_name">Read Book</p>
            <button class="item_button">Delete</button>
        </div>
        <div class="item_div">
            <p class="item_name">Doing Gym</p>
            <button class="item_button">Delete</button>
        </div>

    </div>
</body>
</html>
