<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day8c</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .outer_div{
            margin: 40px;
            border: 1px solid rgb(214, 211, 211);
            width: 78%;
            height: 430px;
            background-color: rgb(127, 166, 88);
            padding: 10px;
            border-radius: 15px;
        }
        .main_head{
            margin: 5px;
            font-size: 25px;
            font-weight: 645;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .cards_div{
            width: 100%;
            height: 360px;
            border: 1px solid grey;
            border-radius: 5px;
            background-color: aliceblue;
            padding: 6px;
        }
        .card_div{
            border: 1px solid rgb(230, 229, 229);
            width: 350px;
            height: 335px;
            margin: 5px;
            display: inline-block;
            border-radius: 10px;
            box-sizing: border-box;
        }
        .card_image{
            width: 100%;
            height: 250px;
            border-radius: 10px;
        }
        .card_name{
            margin: 10px;
            font-size: 19px;
            font-family: Georgia, 'Times New Roman', Times, serif;

        }
        .card_price{
            margin: 10px;
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="outer_div">
        <h1  class="main_head">Interesting finds</h1>
        <div class="cards_div">
            <div class="card_div">
                <div>
                    <img class="card_image" src="https://rukminim2.flixcart.com/image/280/374/xif0q/inflatable-sofa/h/k/t/7-6-2-seater-7-6-polyester-1-pr-104-getzet-12-7-original-imahjgr6hvv6ejpe.jpeg?q=60"/>
                </div>
                <p class="card_name">Widest Range</p>
                <h2 class="card_price">Special Offer</h2>
            </div>
            <div class="card_div">
                <div>
                    <img class="card_image" src="https://rukminim2.flixcart.com/image/280/374/xif0q/book-shelf/z/o/a/9-particle-board-22-5-17-hexa-neudot-40-00-leon-teak-13-original-imags9n3mpjfhmaz.jpeg?q=60"/>
                </div>
                <p class="card_name">Best Deals Ever</p>
                <h2 class="card_price">Upto 50% Off</h2>
            </div>
            <div class="card_div">
                <div>
                    <img class="card_image" src="https://rukminim2.flixcart.com/image/280/374/xif0q/office-study-chair/u/h/g/1-pvc-polyvinyl-chloride-58-white-robo-oakcraft-138-original-imahg6xyygjkevka.jpeg?q=60"/>
                </div>
                <p class="card_name">Best Deal Ever</p>
                <h2 class="card_price">From ₹4,999</h2>
            </div>
            <div class="card_div">
                <div>
                    <img class="card_image" src="https://rukminim2.flixcart.com/image/280/374/xif0q/bean-bag/u/l/j/xxxl-ms-bbw-cp-3xl-fl-brn-furnon-original-imahf4yjtqvqah25.jpeg?q=60"/>
                </div>
                <p class="card_name">Don't Miss</p>
                <h2 class="card_price">From ₹3,999</h2>
            </div>
        </div>
    </div>
</body>
</html>
